<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>多功能笔刷绘图板 | 修复版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #1e1e1e;
            display: flex;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* 左侧侧边栏 - 适配手机宽度 */
        .sidebar {
            width: 150px;
            background: #fff;
            padding: 10px 6px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-right: 1px solid #e5e7eb;
            flex-shrink: 0;
            overflow-y: auto;
            font-size: 12px;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .sidebar-section > .title {
            font-size: 12px;
            color: #666;
            padding-left: 4px;
        }

        .row-group {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        /* 快捷色块 */
        .color-btn {
            width: 24px;
            height: 24px;
            border-radius: 3px;
            border: 2px solid transparent;
            cursor: pointer;
        }
        .color-btn.active {
            border-color: #409eff;
        }

        /* 全色域圆形调色盘 */
        .color-wheel-wrap {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 4px auto;
        }
        #colorWheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            cursor: crosshair;
            box-shadow: 0 0 6px #ccc;
        }
        .color-dot {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #fff;
            border: 1px solid #333;
            pointer-events: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* 按钮通用样式 */
        .sidebar button {
            padding: 6px 4px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            transition: 0.15s;
            font-size: 12px;
            min-height: 32px;
            flex: 1;
        }
        .sidebar button.active {
            background: #409eff;
            color: #fff;
            border-color: #409eff;
        }
        .sidebar button:active {
            opacity: 0.85;
        }

        /* 主画布区域 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
            position: relative;
            overflow: hidden;
        }

        .top-bar {
            height: 40px;
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0 8px;
        }
        .top-bar button {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .top-bar button:active {
            background: #f0f2f5;
        }

        /* 画布容器 - 修复画布占比问题，支持拖拽平移 */
        #canvas-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            background-image: linear-gradient(#f0f0f0 1px, transparent 1px),
                              linear-gradient(90deg, #f0f0f0 1px, transparent 1px);
            background-size: 20px 20px;
        }
        #drawCanvas {
            position: absolute;
            top: 0;
            left: 0;
            display: block;
            cursor: crosshair;
            touch-action: none;
        }

        /* 底部控制栏 */
        .bottom-bar {
            height: 44px;
            background: #fff;
            border-top: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            gap: 6px;
        }
        .ctrl-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .bottom-bar button {
            padding: 5px 7px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
        }
        .bottom-bar button.primary {
            background: #409eff;
            color: #fff;
            border-color: #409eff;
        }
        .bottom-bar button.danger {
            background: #f56c6c;
            color: #fff;
            border-color: #f56c6c;
        }
        .bottom-bar button.warn {
            background: #e6a23c;
            color: #fff;
            border-color: #e6a23c;
        }
        .bottom-bar button.success {
            background: #67c23a;
            color: #fff;
            border-color: #67c23a;
        }
        #zoomLevel {
            font-size: 12px;
            min-width: 42px;
            text-align: center;
        }

        /* 手机适配 */
        @media (max-width: 600px) {
            .sidebar { 
                width: 120px; 
                padding: 8px 4px;
                font-size: 11px;
            }
            .color-wheel-wrap { 
                width: 100px; 
                height: 100px; 
            }
            .bottom-bar button { 
                padding: 4px 5px; 
                font-size: 11px; 
            }
            .row-group {
                gap: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <!-- 快捷颜色 -->
        <div class="sidebar-section">
            <div class="title">快捷颜色</div>
            <div class="row-group">
                <div class="color-btn active" style="background:#000000" data-color="#000000"></div>
                <div class="color-btn" style="background:#ffffff;border:1px solid #ccc" data-color="#ffffff"></div>
                <div class="color-btn" style="background:#ff3333" data-color="#ff3333"></div>
                <div class="color-btn" style="background:#ff9900" data-color="#ff9900"></div>
                <div class="color-btn" style="background:#ffff00" data-color="#ffff00"></div>
                <div class="color-btn" style="background:#33dd33" data-color="#33dd33"></div>
                <div class="color-btn" style="background:#2288ff" data-color="#2288ff"></div>
                <div class="color-btn" style="background:#9944ff" data-color="#9944ff"></div>
            </div>
        </div>

        <!-- 全色域圆形调色盘 -->
        <div class="sidebar-section">
            <div class="title">全色域调色盘</div>
            <div class="color-wheel-wrap">
                <canvas id="colorWheel"></canvas>
                <div class="color-dot"></div>
            </div>
        </div>

        <!-- 笔刷类型 -->
        <div class="sidebar-section">
            <div class="title">笔刷类型</div>
            <div class="row-group">
                <button id="penNormal" class="active">普通画笔</button>
                <button id="penGel">中性笔(行楷)</button>
                <button id="penBrush">毛笔(楷书)</button>
                <button id="penFluo">荧光笔</button>
            </div>
        </div>

        <!-- 笔触粗细 5档 -->
        <div class="sidebar-section">
            <div class="title">笔触粗细(5档)</div>
            <div class="row-group">
                <button class="lineSize" data-val="2">极细</button>
                <button class="lineSize" data-val="4">细</button>
                <button class="lineSize active" data-val="7">中</button>
                <button class="lineSize" data-val="11">粗</button>
                <button class="lineSize" data-val="16">极粗</button>
            </div>
        </div>

        <!-- 橡皮大小 5档 -->
        <div class="sidebar-section">
            <div class="title">橡皮大小(5档)</div>
            <div class="row-group">
                <button class="eraserSize" data-val="6">极小</button>
                <button class="eraserSize" data-val="12">小</button>
                <button class="eraserSize active" data-val="18">中</button>
                <button class="eraserSize" data-val="26">大</button>
                <button class="eraserSize" data-val="36">极大</button>
            </div>
        </div>

        <!-- 工具 -->
        <div class="sidebar-section">
            <div class="title">绘图工具</div>
            <div class="row-group">
                <button id="toolPen" class="active">画笔</button>
                <button id="toolEraser">橡皮擦</button>
                <button id="clearAll">清空画布</button>
            </div>
        </div>

        <!-- 画布操作 -->
        <div class="sidebar-section">
            <div class="title">画布操作</div>
            <div class="row-group">
                <button id="undoStep">恢复上一步</button>
                <button id="saveLocal">存档</button>
                <button id="loadLocal">读取</button>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="top-bar">
            <button title="选择/平移" id="panBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
                </svg>
            </button>
        </div>

        <div id="canvas-container">
            <canvas id="drawCanvas"></canvas>
        </div>

        <div class="bottom-bar">
            <div class="ctrl-group">
                <button id="zoomOut">-</button>
                <span id="zoomLevel">100%</span>
                <button id="zoomIn">+</button>
            </div>

            <!-- 仅普通画笔可用形变功能 -->
            <div class="ctrl-group">
                <button id="shapeStart" class="primary">开始形变</button>
                <button id="shapeStop" class="danger">停止形变</button>
                <button id="shapeDel" class="warn">删除形变</button>
                <button id="shapeRestore" class="success">恢复形变</button>
            </div>

            <div class="ctrl-group">
                <button id="exportImg">导出图片</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 全局元素 & 状态 ==========
        const drawCanvas = document.getElementById('drawCanvas');
        const drawCtx = drawCanvas.getContext('2d');
        const container = document.getElementById('canvas-container');
        const colorWheel = document.getElementById('colorWheel');
        const wheelCtx = colorWheel.getContext('2d');
        const colorDot = document.querySelector('.color-dot');
        const panBtn = document.getElementById('panBtn');

        // 基础状态
        let isDrawing = false;
        let currentColor = "#000000";
        let lineWidth = 7;
        let eraserWidth = 18;
        let zoom = 1;
        const SAVE_KEY = "draw_canvas_all_data";

        // 工具类型
        const TOOL = { PEN: 0, ERASER: 1, PAN: 2 };
        let curTool = TOOL.PEN;

        // 笔刷类型
        const PEN_TYPE = {
            NORMAL: 0,
            GEL: 1,
            BRUSH: 2,
            FLUO: 3
        };
        let curPenType = PEN_TYPE.NORMAL;

        // 形变状态（仅普通画笔生效）
        let shapeEnable = false;
        let shapePoints = [];
        let shapeTargetPoints = [];
        let shapeAnimFrame = null;
        let shapeOriginImg = null;
        let shapeDeleted = false;

        // 撤销历史栈
        let historyStack = [];
        const MAX_HIST = 30;
        let currentLinePoints = [];

        // 画布平移状态
        let isPanning = false;
        let panStartX = 0;
        let panStartY = 0;
        let canvasOffsetX = 0;
        let canvasOffsetY = 0;

        // ========== 1. 全色域 HSV 圆形调色盘（完整色相+明度+饱和度） ==========
        function initFullColorWheel() {
            const size = colorWheel.offsetWidth;
            colorWheel.width = size;
            colorWheel.height = size;
            const r = size / 2;
            const imgData = wheelCtx.createImageData(size, size);

            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const dx = x - r;
                    const dy = y - r;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > r) continue;

                    const hue = (Math.atan2(dy, dx) / Math.PI / 2 + 1) % 1;
                    const sat = dist / r;
                    const val = 1;

                    const [rr, gg, bb] = hsvToRgb(hue, sat, val);
                    const idx = (y * size + x) * 4;
                    imgData.data[idx] = rr;
                    imgData.data[idx + 1] = gg;
                    imgData.data[idx + 2] = bb;
                    imgData.data[idx + 3] = 255;
                }
            }
            wheelCtx.putImageData(imgData, 0, 0);
        }

        function hsvToRgb(h, s, v) {
            let r, g, b;
            const i = Math.floor(h * 6);
            const f = h * 6 - i;
            const p = v * (1 - s);
            const q = v * (1 - f * s);
            const t = v * (1 - (1 - f) * s);
            switch (i % 6) {
                case 0: r = v; g = t; b = p; break;
                case 1: r = q; g = v; b = p; break;
                case 2: r = p; g = v; b = t; break;
                case 3: r = p; g = q; b = v; break;
                case 4: r = t; g = p; b = v; break;
                default: r = v; g = p; b = q;
            }
            return [Math.round(r * 255), Math.round(g * 255), Math.round(b * 255)];
        }

        function rgbToHex(r, g, b) {
            return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }

        function pickColor(e) {
            const rect = colorWheel.getBoundingClientRect();
            let x, y;
            if (e.type.includes('touch')) {
                x = e.touches[0].clientX - rect.left;
                y = e.touches[0].clientY - rect.top;
            } else {
                x = e.clientX - rect.left;
                y = e.clientY - rect.top;
            }
            const cx = colorWheel.width / 2;
            const cy = colorWheel.height / 2;
            const radius = colorWheel.width / 2;
            let dx = x - cx, dy = y - cy;
            const dist = Math.hypot(dx, dy);
            if (dist > radius) {
                dx = dx / dist * radius;
                dy = dy / dist * radius;
                x = cx + dx;
                y = cy + dy;
            }
            colorDot.style.left = x + "px";
            colorDot.style.top = y + "px";
            const d = wheelCtx.getImageData(x, y, 1, 1).data;
            currentColor = rgbToHex(d[0], d[1], d[2]);
        }

        initFullColorWheel();
        window.addEventListener('resize', initFullColorWheel);
        colorWheel.addEventListener('mousedown', e => { pickColor(e); colorWheel.addEventListener('mousemove', pickColor); });
        colorWheel.addEventListener('mouseup', () => colorWheel.removeEventListener('mousemove', pickColor));
        colorWheel.addEventListener('mouseleave', () => colorWheel.removeEventListener('mousemove', pickColor));
        colorWheel.addEventListener('touchstart', pickColor);
        colorWheel.addEventListener('touchmove', pickColor);

        // 快捷色块选色
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.onclick = function () {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentColor = this.dataset.color;
            };
        });

        // ========== 2. 画布初始化 & 撤销历史 ==========
        function resizeCanvas() {
            drawCanvas.width = container.clientWidth;
            drawCanvas.height = container.clientHeight;
            drawCtx.lineCap = "round";
            drawCtx.lineJoin = "round";
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function saveHistory() {
            historyStack.push(drawCanvas.toDataURL("image/png"));
            if (historyStack.length > MAX_HIST) historyStack.shift();
        }
        document.getElementById('undoStep').onclick = function () {
            if (historyStack.length <= 0) { alert("无可恢复步骤"); return; }
            const last = historyStack.pop();
            const img = new Image();
            img.onload = () => {
                drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
                drawCtx.drawImage(img, 0, 0);
            };
            img.src = last;
            stopShapeAnimation();
        };

        // ========== 3. 坐标获取（适配缩放+平移） ==========
        function getPos(e) {
            const rect = drawCanvas.getBoundingClientRect();
            let x, y;
            if (e.type.includes('touch')) {
                x = e.touches[0].clientX;
                y = e.touches[0].clientY;
            } else {
                x = e.clientX;
                y = e.clientY;
            }
            return { 
                x: (x - rect.left - canvasOffsetX) / zoom, 
                y: (y - rect.top - canvasOffsetY) / zoom 
            };
        }

        // ========== 4. 线条平滑算法（中性笔行楷、毛笔楷书美化） ==========
        function smoothPoints(points, level = 3) {
            if (points.length < 3) return points;
            const res = [...points];
            for (let i = 0; i < level; i++) {
                for (let j = 1; j < res.length - 1; j++) {
                    res[j].x = (res[j - 1].x + res[j].x * 2 + res[j + 1].x) / 4;
                    res[j].y = (res[j - 1].y + res[j].y * 2 + res[j + 1].y) / 4;
                }
            }
            return res;
        }

        function drawSmoothLine(points, width, color, alpha = 1) {
            drawCtx.globalAlpha = alpha;
            drawCtx.beginPath();
            drawCtx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                drawCtx.lineTo(points[i].x, points[i].y);
            }
            drawCtx.lineWidth = width;
            drawCtx.strokeStyle = color;
            drawCtx.stroke();
            drawCtx.globalAlpha = 1;
        }

        // ========== 5. 柔性线条形变（仅普通画笔可用） ==========
        function initShapePoints(points) {
            shapePoints = [...points];
            shapeTargetPoints = points.map(p => {
                const ox = (Math.random() - 0.5) * 14;
                const oy = (Math.random() - 0.5) * 14;
                return { x: p.x + ox, y: p.y + oy };
            });
            shapeOriginImg = drawCanvas.toDataURL("image/png");
            shapeDeleted = false;
        }
        function lerp(a, b, t) { return a + (b - a) * t; }
        function runShapeAnim() {
            if (!shapeEnable || shapePoints.length === 0) return;
            let progress = 0;
            const speed = 0.012;
            function animate() {
                progress += speed;
                if (progress > 1) progress = 0;
                drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
                drawCtx.beginPath();
                shapePoints.forEach((p, idx) => {
                    const tx = shapeTargetPoints[idx].x;
                    const ty = shapeTargetPoints[idx].y;
                    const cx = lerp(p.x, tx, progress);
                    const cy = lerp(p.y, ty, progress);
                    idx === 0 ? drawCtx.moveTo(cx, cy) : drawCtx.lineTo(cx, cy);
                });
                drawCtx.lineWidth = lineWidth;
                drawCtx.strokeStyle = currentColor;
                drawCtx.stroke();
                shapeAnimFrame = requestAnimationFrame(animate);
            }
            animate();
        }
        function stopShapeAnimation() {
            if (shapeAnimFrame) cancelAnimationFrame(shapeAnimFrame);
            shapeAnimFrame = null;
        }

        // 形变四大按钮
        document.getElementById('shapeStart').onclick = function () {
            if (curPenType !== PEN_TYPE.NORMAL) {
                alert("仅【普通画笔】支持线条形变！");
                return;
            }
            if (shapePoints.length === 0) { alert("请先绘制线条"); return; }
            shapeEnable = true; shapeDeleted = false; runShapeAnim();
        };
        document.getElementById('shapeStop').onclick = function () {
            shapeEnable = false; stopShapeAnimation();
        };
        document.getElementById('shapeDel').onclick = function () {
            stopShapeAnimation(); shapeEnable = false; shapeDeleted = true;
            if (shapeOriginImg) {
                const img = new Image();
                img.onload = () => {
                    drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
                    drawCtx.drawImage(img, 0, 0);
                };
                img.src = shapeOriginImg;
            }
        };
        document.getElementById('shapeRestore').onclick = function () {
            if (!shapeDeleted || shapePoints.length === 0) { alert("暂无可恢复形变"); return; }
            shapeDeleted = false; shapeEnable = true; runShapeAnim();
        };

        // ========== 6. 画布平移功能 ==========
        function startPan(e) {
            if (curTool !== TOOL.PAN) return;
            isPanning = true;
            const rect = drawCanvas.getBoundingClientRect();
            if (e.type.includes('touch')) {
                panStartX = e.touches[0].clientX - rect.left - canvasOffsetX;
                panStartY = e.touches[0].clientY - rect.top - canvasOffsetY;
            } else {
                panStartX = e.clientX - rect.left - canvasOffsetX;
                panStartY = e.clientY - rect.top - canvasOffsetY;
            }
        }

        function panCanvas(e) {
            if (!isPanning || curTool !== TOOL.PAN) return;
            const rect = drawCanvas.getBoundingClientRect();
            let x, y;
            if (e.type.includes('touch')) {
                x = e.touches[0].clientX - rect.left;
                y = e.touches[0].clientY - rect.top;
            } else {
                x = e.clientX - rect.left;
                y = e.clientY - rect.top;
            }
            canvasOffsetX = x - panStartX;
            canvasOffsetY = y - panStartY;
            updateCanvasTransform();
        }

        function stopPan() {
            isPanning = false;
        }

        function updateCanvasTransform() {
            drawCanvas.style.transform = `translate(${canvasOffsetX}px, ${canvasOffsetY}px) scale(${zoom})`;
            drawCanvas.style.transformOrigin = 'top left';
        }

        // ========== 7. 核心绘制逻辑 ==========
        function startDraw(e) {
            if (curTool === TOOL.PAN) {
                startPan(e);
                return;
            }
            e.preventDefault();
            isDrawing = true;
            const pos = getPos(e);
            saveHistory();
            drawCtx.beginPath();
            drawCtx.moveTo(pos.x, pos.y);
            currentLinePoints = [{ x: pos.x, y: pos.y }];
            stopShapeAnimation();
            shapeEnable = false;
        }
        function draw(e) {
            if (curTool === TOOL.PAN) {
                panCanvas(e);
                return;
            }
            e.preventDefault();
            if (!isDrawing) return;
            const pos = getPos(e);
            currentLinePoints.push({ x: pos.x, y: pos.y });

            if (curTool === TOOL.ERASER) {
                drawCtx.globalCompositeOperation = "destination-out";
                drawCtx.lineWidth = eraserWidth;
                drawCtx.lineTo(pos.x, pos.y);
                drawCtx.stroke();
            } else {
                drawCtx.globalCompositeOperation = "source-over";
                switch (curPenType) {
                    case PEN_TYPE.FLUO:
                        drawCtx.globalAlpha = 0.55;
                        drawCtx.lineWidth = lineWidth;
                        drawCtx.strokeStyle = currentColor;
                        drawCtx.lineTo(pos.x, pos.y);
                        drawCtx.stroke();
                        drawCtx.globalAlpha = 1;
                        break;
                    default:
                        drawCtx.lineWidth = lineWidth;
                        drawCtx.strokeStyle = currentColor;
                        drawCtx.lineTo(pos.x, pos.y);
                        drawCtx.stroke();
                }
            }
        }
        function endDraw(e) {
            if (curTool === TOOL.PAN) {
                stopPan();
                return;
            }
            e.preventDefault();
            isDrawing = false;
            if (curTool === TOOL.ERASER || currentLinePoints.length < 4) return;

            // 中性笔 → 自动平滑行楷
            if (curPenType === PEN_TYPE.GEL) {
                const smooth = smoothPoints(currentLinePoints, 4);
                drawSmoothLine(smooth, lineWidth, currentColor);
            }
            // 毛笔 → 端正规整楷书笔触
            else if (curPenType === PEN_TYPE.BRUSH) {
                const smooth = smoothPoints(currentLinePoints, 5);
                drawSmoothLine(smooth, lineWidth, currentColor, 0.92);
                drawSmoothLine(smooth, lineWidth * 0.75, currentColor, 1);
            }
            // 普通画笔 → 存入点位，支持形变
            else if (curPenType === PEN_TYPE.NORMAL) {
                initShapePoints(currentLinePoints);
            }
        }
