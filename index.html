<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 关键：适配手机屏幕 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高考加油！</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px; /* 限制最大宽度，防止大屏上太宽 */
            text-align: center;
        }
        h1 {
            font-size: 28px;
            color: #222;
            margin-bottom: 30px;
        }
        /* 按钮样式 */
        .link-btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            background-color: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            text-decoration: none;
            color: #0056cc;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .link-btn:hover {
            background-color: #f0f6ff;
            border-color: #0056cc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>高考补报名</h1>
        <!-- target="_blank" 点击新开标签页，不会影响当前页面 -->
        <a href="http://www.hncyyz.cn/" class="link-btn" target="_blank">报名入口</a >
    </div>
</body>
</html>
